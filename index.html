<!DOCTYPE html><html lang="vi"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Hệ Thống Trắc Nghiệm Ôn CK2 GDĐP 9 - Pro Interface</title>    <style>        /* --- Core Configuration & Reset --- */        :root {            /* Light Theme (Gradient Green Yellow) */            --bg-light-1: #96fbc4;            --bg-light-2: #f9f586;            --grid-color-light: rgba(0, 0, 0, 0.05);                        /* Dark Theme (Gradient Dark Blue) - Ajusted for readability with black font */            --bg-dark-1: #13547a;            --bg-dark-2: #80d0c7;            --grid-color-dark: rgba(0, 0, 0, 0.1);            /* Universal Colors */            --text-color: #000000; /* STRICT REQUIREMENT: Font black everywhere */            --white-ui: #ffffff;            --border-color: rgba(0, 0, 0, 0.15);                        /* UI colors */            --primary: #2ecc71;            --correct-bg: rgba(46, 204, 113, 0.2);            --correct-border: #2ecc71;            --incorrect-bg: rgba(231, 76, 60, 0.2);            --incorrect-border: #e74c3c;                        /* Animation timings */            --ease-fast: 0.2s ease;            --ease-std: 0.4s ease-out;            --tween-slow: 0.6s cubic-bezier(0.23, 1, 0.32, 1);                        /* Sizing variables */            --container-max-width: 800px;        }        body.dark-mode {            --bg-1: var(--bg-dark-1);            --bg-2: var(--bg-dark-2);            --grid-color: var(--grid-color-dark);            --white-ui: rgba(255, 255, 255, 0.9); /* Slightly muted white for eye comfort */        }        body:not(.dark-mode) {            --bg-1: var(--bg-light-1);            --bg-2: var(--bg-light-2);            --grid-color: var(--grid-color-light);            --white-ui: #ffffff;        }        * {            box-sizing: border-box;            margin: 0;            padding: 0;            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;            -webkit-font-smoothing: antialiased;            -moz-osx-font-smoothing: grayscale;            color: var(--text-color); /* Strict black font enforcement */        }        body {            height: 100vh;            width: 100vw;            overflow: hidden; /* Manage scrolling internally per screen */            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));            transition: background 1s ease; /* Slow smooth transition for theme change */            display: flex;            flex-direction: column;            position: relative;        }        /* --- Moving 2D Grid Background (Grid Tween Animation) --- */        #grid-background {            position: absolute;            top: 0;            left: 0;            width: 200%; /* Wider than screen to accommodate movement */            height: 200%; /* Taller than screen to accommodate movement */            background-image:                 linear-gradient(var(--grid-color) 1px, transparent 1px),                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);            background-size: 50px 50px; /* Caro line spacing */            z-index: 0;            pointer-events: none;            /* Tween Animation: smooth, medium-fast speed */            animation: grid-move 15s linear infinite;        }        @keyframes grid-move {            0% { transform: translate(0, 0); }            100% { transform: translate(-50px, -50px); }        }        /* --- UI Elements Layering --- */        #main-wrapper {            position: relative;            z-index: 10;            flex: 1;            display: flex;            flex-direction: column;            overflow-y: auto; /* Allow content scrolling */        }        /* --- Header: Theme Toggle & Timer --- */        header {            padding: 15px 25px;            display: flex;            justify-content: space-between;            align-items: center;            background: rgba(255, 255, 255, 0.1);            backdrop-filter: blur(5px);            border-bottom: 1px solid var(--border-color);        }        .header-left {            display: flex;            align-items: center;            gap: 15px;        }        .sys-title {            font-weight: 700;            font-size: 1.2rem;        }        #timer-display {            font-size: 1.1rem;            font-weight: 600;            padding: 5px 15px;            border-radius: 20px;            background: var(--white-ui);            display: none; /* Hidden during setup */        }        /* Toggle Button styling */        .toggle-btn {            background: none;            border: 2px solid var(--text-color);            padding: 6px 12px;            border-radius: 20px;            cursor: pointer;            font-weight: 600;            font-size: 0.9rem;            transition: all var(--ease-fast);        }        .toggle-btn:hover {            background: var(--text-color);            color: var(--white-ui);        }        body.dark-mode .toggle-btn::after { content: ' sáng' }        body:not(.dark-mode) .toggle-btn::after { content: ' tối' }        /* --- Screens Management --- */        .screen {            display: none; /* Default hidden */            flex: 1;            padding: 30px 20px;            justify-content: center;            align-items: center;            opacity: 0;            transition: opacity var(--ease-std);        }        .screen.active {            display: flex;            opacity: 1;        }        /* Universal Container for content */        .container {            background: var(--white-ui);            width: 100%;            max-width: var(--container-max-width);            border-radius: 15px;            padding: 30px;            box-shadow: 0 10px 30px rgba(0,0,0,0.1);            position: relative;            transform: translateY(20px);            transition: transform var(--tween-slow);        }        .screen.active .container {            transform: translateY(0);        }        /* Universal Button Styling (Intelligent Coding Style) */        .btn {            padding: 12px 28px;            border-radius: 8px;            border: none;            cursor: pointer;            font-weight: 600;            font-size: 1rem;            transition: all var(--ease-fast);            position: relative;            overflow: hidden;            border: 1px solid transparent;        }        .btn-primary {            background: var(--primary);            color: var(--white-ui); /* Strict requirement broken? Primary often needs white text. If absolutely needed black: change background color */        }        .btn-primary:hover {            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);            transform: translateY(-2px);        }        .btn-secondary {            background: none;            border: 1px solid var(--text-color);        }        .btn-secondary:hover {            background: var(--text-color);            color: var(--white-ui);        }        /* --- SCREEN 1: Setup --- */        #setup-screen .container {            text-align: center;        }        #setup-screen h1 {            margin-bottom: 25px;            font-size: 2rem;        }        .option-group {            margin-bottom: 25px;            text-align: left;        }        .option-label {            font-weight: 600;            margin-bottom: 10px;            display: block;        }        .window-options {            display: grid;            grid-template-columns: repeat(3, 1fr);            gap: 10px;        }        .window-radio {            display: none;        }        .window-label {            display: block;            padding: 15px;            border: 2px solid var(--border-color);            border-radius: 8px;            cursor: pointer;            text-align: center;            font-weight: 600;            transition: all var(--ease-fast);        }        .window-radio:checked + .window-label {            border-color: var(--text-color);            background: rgba(0,0,0,0.05);        }        #start-system-btn {            width: 100%;        }        /* --- SCREEN 2: Quiz System --- */        #quiz-screen .container {            padding-top: 20px;        }        /* Progress Bar (Intelligent Coding) */        .progress-container {            margin-bottom: 25px;        }        .progress-bar-base {            width: 100%;            height: 8px;            background: rgba(0,0,0,0.1);            border-radius: 4px;            overflow: hidden;        }        #progress-bar-fill {            height: 100%;            background: var(--primary);            width: 0%; /* Start at 0% */            /* Progress bar only increases progress when going to the next question */            transition: width var(--tween-slow);        }        .question-box {            margin-bottom: 30px;        }        .q-meta {            font-size: 0.9rem;            font-weight: 600;            margin-bottom: 10px;            display: block;        }        #question-text {            font-size: 1.3rem;            font-weight: 600;            margin-bottom: 20px;        }        /* Tween Options mượt mà */        .options-list {            display: flex;            flex-direction: column;            gap: 12px;        }        .option-item {            padding: 15px;            border: 1px solid var(--border-color);            border-radius: 8px;            cursor: pointer;            transition: all var(--ease-fast);            display: flex;            align-items: center;            position: relative;        }        /* Add hover tween */        .option-item:hover {            border-color: var(--text-color);            background: rgba(0,0,0,0.02);            transform: translateX(5px);        }        .option-item.selected {            border-color: var(--text-color);            background: rgba(0,0,0,0.08);            border-width: 2px;        }        .opt-char {            font-weight: 700;            margin-right: 15px;            display: flex;            justify-content: center;            align-items: center;            width: 30px;            height: 30px;            border-radius: 50%;            background: rgba(0,0,0,0.05);        }        /* Quiz Navigation */        .quiz-nav {            display: flex;            justify-content: space-between;            gap: 15px;            margin-top: 30px;            border-top: 1px solid var(--border-color);            padding-top: 20px;        }        #prev-btn {            display: none; /* Hidden on Q1 */        }        #submit-btn {            display: none; /* Only show on last question */        }        /* --- SCREEN 3: Results --- */        #result-screen .container {            text-align: center;            padding: 50px 30px;        }        #result-screen h2 { margin-bottom: 20px; font-size: 2rem; }        /* Sau khi nộp bài hiển thị điểm số theo dài vòng tròn */        .score-circle-container {            position: relative;            width: 150px;            height: 150px;            margin: 0 auto 30px auto;        }        .score-circle-svg {            transform: rotate(-90deg);        }        .circle-bg {            fill: none;            stroke: rgba(0,0,0,0.1);            stroke-width: 10;        }        .circle-progress {            fill: none;            stroke: var(--primary);            stroke-width: 10;            stroke-dasharray: 440; /* 2 * PI * R */            stroke-dashoffset: 440; /* Fill based on score */            transition: stroke-dashoffset 1.5s ease-in-out;            stroke-linecap: round;        }        .score-text-absolute {            position: absolute;            top: 50%;            left: 50%;            transform: translate(-50%, -50%);            text-align: center;        }        #score-percent { font-size: 2rem; font-weight: 700; }        #score-numeric { font-size: 0.9rem; font-weight: 600; opacity: 0.7; }        .result-actions {            display: flex;            gap: 15px;            justify-content: center;        }        /* --- SCREEN 4: Review Mode --- */        /* UI giống như khi đang làm bài */        body.review-mode #progress-bar-fill {            width: 100% !important; /* In review, progress is full */        }        body.review-mode .quiz-nav {            border-top: none;            padding-top: 0;            margin-top: 20px;        }                body.review-mode .review-only-nav {            width: 100%;            display: flex;            justify-content: space-between;            margin-top: 20px;        }        /* Giao diện UI chỉ xem đáp án người dùng đã chọn và đáp án đúng */        .option-item.review-user-choice {            border-color: var(--text-color);            background: rgba(0,0,0,0.05);        }        .option-item.review-correct {            border-color: var(--correct-border);            background: var(--correct-bg);            border-width: 2px;        }        .option-item.review-user-incorrect {            border-color: var(--incorrect-border);            background: var(--incorrect-bg);            border-width: 2px;        }        .review-label {            margin-left: auto;            font-size: 0.8rem;            font-weight: 700;            text-transform: uppercase;        }        .review-label.correct { color: var(--correct-border); }        .review-label.incorrect { color: var(--incorrect-border); }        /* Kèm theo hộp thoại thông báo nhỏ ở dưới có tích xanh hoặc đỏ */        #review-notification {            position: fixed;            bottom: 20px;            left: 50%;            transform: translateX(-50%) translateY(100px);            background: var(--white-ui);            padding: 15px 20px;            border-radius: 8px;            box-shadow: 0 5px 20px rgba(0,0,0,0.2);            border-left: 5px solid transparent;            width: calc(100% - 40px);            max-width: var(--container-max-width);            display: flex;            align-items: center;            gap: 15px;            z-index: 100;            transition: transform var(--ease-std);        }        #review-notification.active {            transform: translateX(-50%) translateY(0);        }        /* font chữ đen cho notification */        #review-notification * { color: #000000; }        .notify-icon {            font-size: 1.5rem;            width: 30px;            height: 30px;            display: flex;            justify-content: center;            align-items: center;        }                .notify-icon.correct { color: var(--correct-border); }        .notify-icon.correct::before { content: '✓'; }                .notify-icon.incorrect { color: var(--incorrect-border); }        .notify-icon.incorrect::before { content: '✕'; }        #review-notification.notify-correct { border-color: var(--correct-border); }        #review-notification.notify-incorrect { border-color: var(--incorrect-border); }        /* nút tắt x nhỏ */        #close-notify {            background: none;            border: none;            cursor: pointer;            font-size: 1.1rem;            margin-left: auto;            opacity: 0.5;        }        #close-notify:hover { opacity: 1; }        /* --- Full-Screen Mode Styling --- */        body.fullscreen-mode #grid-background {            animation-duration: 10s; /* Faster animation in full screen */        }        body.fullscreen-mode #main-wrapper {            padding: 0;        }        body.fullscreen-mode .screen {            height: 100%;            padding: 0;        }        body.fullscreen-mode .container {            max-width: 100%;            height: 100%;            border-radius: 0;            display: flex;            flex-direction: column;            padding: 20px;        }        body.fullscreen-mode .question-box { flex: 1; overflow-y: auto; }        /* --- Responsiveness (Mobile Integration) --- */        @media (max-width: 600px) {            .window-options { grid-template-columns: 1fr; }            header { padding: 10px 15px; }            .sys-title { font-size: 1rem; }            .container { padding: 20px; border-radius: 10px; }            #question-text { font-size: 1.1rem; }            .quiz-nav { flex-direction: column; gap: 10px; }            .quiz-nav .btn { width: 100%; }            .result-actions { flex-direction: column; gap: 10px; }            .result-actions .btn { width: 100%; }        }    </style></head><body class="light-mode">    <div id="grid-background"></div>    <div id="main-wrapper">        <header>            <div class="header-left">                <div class="sys-title">CK2 GDĐP 9</div>                <div id="timer-display">15:00</div>            </div>            <button id="theme-toggle" class="toggle-btn" onclick="toggleTheme()">Chế độ</button>        </header>        <div id="review-notification">            <div id="notify-status-icon" class="notify-icon"></div>            <div id="notify-msg" style="font-weight:600;">Bạn đã chọn đúng</div>            <button id="close-notify" onclick="hideReviewNotification()">✕</button>        </div>        <section id="setup-screen" class="screen active">            <div class="container">                <h1>Hệ Thống Trắc Nghiệm</h1>                                <div class="option-group">                    <label class="option-label">Chọn chế độ cửa sổ:</label>                    <div class="window-options">                        <input type="radio" name="windowSize" id="size-normal" value="normal" checked class="window-radio">                        <label for="size-normal" class="window-label">Normal</label>                                                <input type="radio" name="windowSize" id="size-large" value="large" class="window-radio">                        <label for="size-large" class="window-label">Large</label>                                                <input type="radio" name="windowSize" id="size-fullscreen" value="fullscreen" class="window-radio">                        <label for="size-fullscreen" class="window-label">Full-Screen</label>                    </div>                </div>                <button id="start-system-btn" class="btn btn-primary" onclick="startSystem()">Start System</button>            </div>        </section>        <section id="quiz-screen" class="screen">            <div class="container">                                <div class="progress-container">                    <div class="progress-bar-base">                        <div id="progress-bar-fill"></div>                    </div>                </div>                <div class="question-box">                    <span id="q-number" class="q-meta">Câu 1/30</span>                    <h3 id="question-text">Loading question...</h3>                                        <div id="options-container" class="options-list">                        </div>                </div>                <div id="standard-nav" class="quiz-nav">                    <button id="prev-btn" class="btn btn-secondary" onclick="prevQuestion()">Quay lại</button>                    <button id="next-btn" class="btn btn-secondary" onclick="nextQuestion()" style="margin-left:auto;">Câu tiếp theo</button>                    <button id="submit-btn" class="btn btn-primary" onclick="submitQuiz()" style="margin-left:auto;">Submit</button>                </div>                                <div id="review-nav" class="quiz-nav" style="display:none;">                     <button id="rev-prev-btn" class="btn btn-secondary" onclick="reviewPrev()">Quay lại</button>                     <button id="rev-retake-btn" class="btn btn-secondary" onclick="retakeFromReview()">Làm lại bài</button>                     <button id="rev-next-btn" class="btn btn-secondary" onclick="reviewNext()" style="margin-left:auto;">Câu tiếp theo</button>                     <button id="rev-exit-btn" class="btn btn-primary" onclick="showResults()" style="display:none; margin-left:auto;">Về trang điểm số</button>                </div>            </div>        </section>        <section id="result-screen" class="screen">            <div class="container">                <h2>Hoàn thành!</h2>                                <div class="score-circle-container">                    <svg class="score-circle-svg" viewBox="0 0 160 160">                        <circle class="circle-bg" cx="80" cy="80" r="70"></circle>                        <circle id="progress-circle-fill" class="circle-progress" cx="80" cy="80" r="70"></circle>                    </svg>                    <div class="score-text-absolute">                        <div id="score-percent">0%</div>                        <div id="score-numeric">0/30</div>                    </div>                </div>                <div class="result-actions">                    <button id="retake-btn" class="btn btn-secondary" onclick="retakeQuiz()">Làm lại bài</button>                    <button id="review-btn" class="btn btn-primary" onclick="startReviewSystem()">Review system</button>                </div>            </div>        </section>    </div>    <script>        // --- QUIZ DATA ---        // Thêm tính năng đảo thứ tự câu hỏi -> logic applied during initialization        const rawQuizData = [            { q: "Thách thức nghiêm trọng nhất mà TP. Hồ Chí Minh đang đối mặt từ biến đổi khí hậu là gì?", o: ["Động đất và núi lửa.", "Ngập lụt và thiệt hại tài sản.", "Sa mạc hóa vùng ven biển.", "Sóng thần và lốc xoáy."], a: 1 },            { q: "Hành vi nào sau đây bị coi là xâm phạm tài sản công tại địa phương?", o: ["Trồng cây xanh trong khuôn viên nhà.", "Tham gia dọn vệ sinh đường phố.", "Đóng góp quỹ xây dựng trường học.", "Lấn chiếm vỉa hè, lòng đường để kinh doanh."], a: 3 },            { q: "Ai có trách nhiệm và nghĩa vụ trong việc bảo vệ môi trường Thành phố?", o: ["Chỉ có lực lượng công an và dân phòng.", "Mỗi người dân sinh sống tại Thành phố.", "Chỉ có lãnh đạo chính quyền Thành phố.", "Chỉ có các công ty môi trường đô thị."], a: 1 },            { q: "Mục đích của việc chính quyền ban hành các nghị quyết về quản lý tài sản công là gì?", o: ["Đảm bảo nguồn lực được sử dụng tiết kiệm, hiệu quả.", "Tăng thuế đối với các hộ gia đình cá nhân.", "Giới hạn quyền tự do đi lại của người dân.", "Tập trung tài sản cho các doanh nghiệp nước ngoài."], a: 0 },            { q: "Đâu là hành vi thiết thực để phòng chống thiên tai và bảo vệ tài nguyên?", o: ["Xả nước thải trực tiếp ra kênh rạch.", "Sử dụng lãng phí năng lượng điện.", "Tiết kiệm nước, điện trong sinh hoạt và sản xuất.", "Chặt bỏ cây xanh để xây dựng công trình cá nhân."], a: 2 },            { q: "Công dân cần làm gì khi phát hiện hành vi xâm phạm tài sản chung?", o: ["Giữ im lặng để tránh phiền phức.", "Cổ vũ và làm theo các hành vi đó.", "Mạnh dạn góp ý và đấu tranh chống lại sai trái.", "Chia sẻ lên mạng xã hội để câu tương tác."], a: 2 },            { q: "Yếu tố nào là \"then chốt\" tạo nên sức mạnh tổng hợp trong bảo vệ và xây dựng Thành phố?", o: ["Sự đầu tư hoàn toàn từ các nguồn vốn nước ngoài.", "Sự thực hiện cưỡng chế của các cơ quan chức năng.", "Việc áp dụng các hình phạt thật nặng bằng tiền.", "Sự đóng góp tự nguyện và đồng thuận của cộng đồng."], a: 3 },            { q: "Du lịch xanh được định nghĩa là loại hình du lịch như thế nào?", o: ["Chỉ tập trung vào việc kiếm lợi nhuận kinh tế.", "Chỉ diễn ra ở những nơi có rừng cây rậm rạp.", "Có trách nhiệm với môi trường và bảo tồn văn hóa.", "Sử dụng phương tiện giao thông chạy bằng xăng dầu."], a: 2 },            { q: "Địa phương nào tại TP.HCM được mệnh danh là \"lá phổi xanh\" với Khu dự trữ sinh quyển thế giới?", o: ["Hóc Môn.", "Thành phố Thủ Đức.", "Cần Giờ.", "Củ Chi."], a: 2 },            { q: "Loại hình du lịch tiêu biểu tại Củ Chi là gì?", o: ["Du lịch mua sắm tại các trung tâm thương mại.", "Trải nghiệm tour xe đạp khám phá đồng quê.", "Tham quan các tòa nha chọc trời hiện đại.", "Nghỉ dưỡng tại các resort 5 sao cao cấp."], a: 1 },            { q: "Thảo Cầm Viên Sài Gòn đóng vai trò gì trong du lịch xanh của Thành phố?", o: ["Bảo tồn động thực vật và tạo không gian xanh giữa lòng đô thị.", "Là trung tâm nghiên cứu nông nghiệp công nghệ cao.", "Là nơi duy nhất cung cấp các sản phẩm OCOP.", "Là di tích lịch sử chiến tranh quan trọng nhất."], a: 0 },            { q: "Mối quan hệ giữa nông nghiệp công nghệ cao và du lịch xanh là gì?", o: ["Hai lĩnh vực này hoàn toàn tách biệt, không liên quan.", "Nông nghiệp công nghệ cao làm giảm sức hút của du lịch xanh.", "Du lịch xanh chỉ phục vụ cho việc bán đất nông nghiệp.", "Mô hình nông nghiệp hiện đại trở thành điểm tham quan hấp dẫn."], a: 3 },            { q: "Để trở thành \"Đại sứ du lịch xanh\", học sinh KHÔNG nên làm hành động nào sau đây?", o: ["Tìm hiểu về lịch sử, văn hóa địa phương.", "Tuyên truyền bạn bè hạn chế rác thải nhựa.", "Sử dụng nhiều túi nilon khi đi du lịch.", "Giới thiệu sản phẩm OCOP đến du khách."], a: 2 },            { q: "Vai trò của học sinh trong việc phát triển du lịch xanh là gì?", o: ["Trực tiếp xây dựng các khu nghỉ dưỡng lớn.", "Vận động gia đình nâng cao ý thức bảo vệ môi trường.", "Quản lý toàn bộ hệ thống kênh rạch của Thành phố.", "Thu phí tham quan tại các điểm di tích lịch sử."], a: 1 },            { q: "Ưu thế du lịch nổi bật của Hóc Môn là gì?", o: ["Lợi thế du lịch đường sông nhờ hệ thống kênh rạch.", "Có các bãi biển đẹp và hệ sinh thái san hô.", "Tập trung nhiều khu công nghiệp nặng.", "Có sân bay quốc tế lớn nhat khu vực."], a: 0 },            { q: "Nhóm nghề nào liên quan đến vận hành máy móc, sửa chữa thiết bị và công nghệ?", o: ["Nhóm nghề kỹ thuật.", "Nhóm nghề nghiên cứu.", "Nhóm nghề thẩm mỹ.", "Nhóm nghề xã hội."], a: 0 },            { q: "Nhóm nghề nghiên cứu tập trung vào những hoạt động nào sau đây?", o: ["Biểu diễn nghệ thuật và thiết kế thời trang.", "Khám phá, điều tra và giải quyết các vấn đề khoa học.", "Phục vụ cộng đồng và chăm sóc sức khỏe.", "Xây dựng các công trình cơ sở hạ tầng."], a: 1 },            { q: "Đâu là một nguồn thông tin đáng tin cậy để tìm hiểu về nghề nghiệp?", o: ["Tin đồn không căn cứ từ mạng xã hội.", "Các bộ phim hành động viễn tưởng.", "Cơ quan, công ty và dữ liệu thống kê lao động.", "Các trò chơi điện tử trực tuyến."], a: 2 },            { q: "Xu hướng tuyển dụng lao động trong tương lai sẽ tập trung vào đối tượng nào?", o: ["Lao động chỉ có sức khỏe mà không có kiến thức.", "Lao động làm việc rập khuôn theo máy móc cũ.", "Lao động có kỹ năng chuyên môn cao và khả năng sáng tạo.", "Lao động thường xuyên thay đổi thái độ làm việc."], a: 2 },            { q: "Bước đầu tiên và quan trọng nhất trong việc xác định nghề nghiệp phù hợp là gì?", o: ["Chọn nghề theo trào lưu của số đông.", "Chọn nghề có mức lương cao nhất ngay lập tức.", "Tự khám phá bản thân (sở thích, năng lực, điểm mạnh).", "Nhờ người khác quyết định hoàn toàn tương lai của mình."], a: 2 },            { q: " \"Điểm yếu\" trong tự nhận thức bản thân được hiểu là gì?", o: ["Những mặt hạn chế cần được cải thiện hoặc khắc phục.", "Những ưu thế vượt trội cần được phát huy tối đa.", "Những công việc mà bạn thấy hứng thú nhất.", "Khả năng thực tế để hoàn thành nhiệm vụ được giao."], a: 0 },            { q: "Yếu tố nào quyết định sự phù hợp của cá nhân với môi trường và tính chất công việc?", o: ["Chỉ dựa vào ngoại hình bên ngoài.", "Chỉ dựa vào tài sản của gia đình.", "Phẩm chất (tỉ mỉ, kiên nhẫn) và năng lực chuyên môn.", "Sự may mắn khi đi xin việc."], a: 2 },            { q: "Mục tiêu dài hạn trong lập kế hoạch nghề nghiệp thường là gì?", o: ["Hoàn thành một bài kiểm tra trên lớp.", "Học tốt một môn học trong một học kỳ.", "Đích đến cuối cùng như trở thành bác sĩ, kỹ sư.", "Tham gia một buổi hội thảo hướng nghiệp ngắn."], a: 2 },            { q: "Kỹ năng nào sau đây được coi là \"kỹ năng mềm\" cần thiết cho mọi ngành nghề?", o: ["Kỹ năng vận hành máy xúc.", "Kỹ năng làm việc nhóm và giải quyết vấn đề.", "Kỹ năng sửa mạch điện phức tạp.", "Kỹ năng lập trình ngôn ngữ máy tính chuyên sâu."], a: 1 },            { q: "Tại sao việc duy trì thói quen học tập chủ động lại quan trọng?", o: ["Giúp nắm vững kiến thức và sẵn sàng tiếp thu cái mới.", "Để đối phó với các kỳ thi áp lực cao.", "Để chứng tỏ mình giỏi hơn những người khác.", "Để không phải làm việc sau khi tốt nghiệp."], a: 0 },            { q: "Để chuẩn bị cho nghề nghiệp đã chọn, học sinh nên thực hiện bước nào?", o: ["Chỉ học những môn mình thích và bỏ qua các môn khác.", "Chờ đến khi tốt nghiệp đại học mới tìm hiểu thực tế.", "Tránh tham gia các hoạt động ngoại khóa để tiết kiệm thời gian.", "Tìm hiểu thực tế qua việc tham quan môi trường làm việc."], a: 3 },            { q: "Thị trường lao động hiện nay đòi hỏi người lao động phải có khả năng gì?", o: ["Làm việc cố định một chỗ, không thay đổi.", "Thích ứng với môi trường làm việc luôn thay đổi.", "Chỉ cần hoàn thành đúng những gì máy móc làm được.", "Hạn chế giao tiếp với đồng nghiệp và cộng đồng."], a: 1 },            { q: "Nhóm nghề xã hội liên quan đến các hoạt động nào?", o: ["Thiết kế đồ họa và sáng tạo nghệ thuật.", "Vận hành các hệ thống tự động hóa.", "Phục vụ cộng đồng, y tế, giáo dục và du lịch.", "Nghiên cứu sinh vật học và hóa học."], a: 2 },            { q: "Việc xác định mục tiêu ngắn hạn có tác dụng gì?", o: ["Tạo động lực và định hướng rõ ràng cho từng giai đoạn.", "Thay thế hoàn toàn cho mục tiêu dài hạn.", "Khiến lộ trình học tập trở nên phức tạp hơn.", "Giảm bớt nhu cầu phải rèn luyện kĩ năng mềm."], a: 0 },            { q: "Đâu là thái độ đúng đắn đối với các chỉ đạo của chính quyền về tài sản công?", o: ["Phản đối vì cho rằng không liên quan đến cá nhân.", "Chỉ thực hiện khi có lực lượng chức năng giám sát.", "Tìm cách lách luật để tư lợi cho bản thân.", "Tôn trọng, ủng hộ và nghiêm chỉnh thực hiện quy định."], a: 3 }        ];        // --- Core System Variables ---        let currentQuizQuestions = []; // Shuffled questions        let userAnswers = new Array(rawQuizData.length).fill(null);        let currentQuestionIndex = 0;        let totalQuestions = rawQuizData.length;                // Time: 15 minutes        const TIME_LIMIT_SECONDS = 15 * 60;        let timerSeconds = TIME_LIMIT_SECONDS;        let timerInterval = null;                let isReviewMode = false;        let notifyTimeout = null;        // --- Initialization & Setup ---        window.addEventListener('load', () => {            initializeSystem();        });        function initializeSystem() {            // Setup default theme (light) already set in body class        }        // --- Theme Management ---        function toggleTheme() {            const body = document.body;            if (body.classList.contains('light-mode')) {                body.classList.remove('light-mode');                body.classList.add('dark-mode');            } else {                body.classList.remove('dark-mode');                body.classList.add('light-mode');            }        }        // --- Screen Switching Logic (Intelligent Tweening implied by CSS) ---        function switchScreen(targetScreenId) {            // 1. Find all screens            const screens = document.querySelectorAll('.screen');            // 2. Remove 'active' from all, causing CSS fade-out            screens.forEach(s => s.classList.remove('active'));                        // 3. Special handling forfullscreen constraints per container            if (targetScreenId === 'setup-screen') {                 document.getElementById('timer-display').style.display = 'none';            }            // 4. Wait for fade-out, then display none and activate new            setTimeout(() => {                const targetScreen = document.getElementById(targetScreenId);                targetScreen.classList.add('active'); // Causes CSS fade-in                                // Extra setup for results screen animation                if (targetScreenId === 'result-screen') {                    animateScoreCircle();                }            }, 300); // Sync with CSS transition time        }        // --- START SYSTEM ---        function startSystem() {            const selectedSize = document.querySelector('input[name="windowSize"]:checked').value;            applyWindowSize(selectedSize);                        resetQuizState();                        // 1. Shuffle Questions            currentQuizQuestions = shuffleArray([...rawQuizData]);                        // 2. Switch to Quiz Screen            switchScreen('quiz-screen');            document.getElementById('timer-display').style.display = 'block';                        // 3. Load Q1 & Start Timer            loadQuestion(0);            startTimer();        }        // Apply pre-start selection of Window Size        function applyWindowSize(size) {            const wrapper = document.getElementById('main-wrapper');            const body = document.body;            body.classList.remove('fullscreen-mode');                        if (size === 'fullscreen') {                body.classList.add('fullscreen-mode');                requestFullScreen(document.documentElement);            } else if (size === 'large') {                // Change container max-width via CSS variable                document.documentElement.style.setProperty('--container-max-width', '1200px');            } else {                // Normal                document.documentElement.style.setProperty('--container-max-width', '800px');            }        }        // Standard Utility: Shuffle array (Fisher-Yates)        function shuffleArray(array) {            for (let i = array.length - 1; i > 0; i--) {                const j = Math.floor(Math.random() * (i + 1));                [array[i], array[j]] = [array[j], array[i]];            }            return array;        }        function resetQuizState() {            isReviewMode = false;            userAnswers = new Array(totalQuestions).fill(null);            currentQuestionIndex = 0;            timerSeconds = TIME_LIMIT_SECONDS;            hideReviewNotification();                        document.body.classList.remove('review-mode');            document.getElementById('standard-nav').style.display = 'flex';            document.getElementById('review-nav').style.display = 'none';            document.getElementById('progress-bar-fill').style.width = '0%';        }        // --- QUIZ LOGIC ---        function loadQuestion(index) {            currentQuestionIndex = index;            const questionData = currentQuizQuestions[index];            const optionChars = ['A', 'B', 'C', 'D'];            // UI Updates            document.getElementById('q-number').textContent = `Câu ${index + 1}/${totalQuestions}`;            document.getElementById('question-text').textContent = questionData.q;                        // Options Injection            const container = document.getElementById('options-container');            container.innerHTML = ''; // Clear old options            questionData.o.forEach((optionText, i) => {                const optItem = document.createElement('div');                optItem.className = 'option-item';                                // Render differently in Review Mode                if (isReviewMode) {                    renderOptionForReview(optItem, questionData, i);                } else {                    // Standard Quiz Mode                    optItem.onclick = () => selectOption(index, i);                    if (userAnswers[index] === i) optItem.classList.add('selected');                }                optItem.innerHTML = `                    <span class="opt-char">${optionChars[i]}</span>                    <span class="opt-text">${optionText}</span>                `;                                // Add labels for review                if (isReviewMode) {                    addReviewLabels(optItem, questionData, i);                }                container.appendChild(optItem);            });            // Navigation buttons visibility logic            document.getElementById('prev-btn').style.display = index === 0 ? 'none' : 'block';                        const nextBtn = document.getElementById('next-btn');            const submitBtn = document.getElementById('submit-btn');                        if (index === totalQuestions - 1) {                nextBtn.style.display = 'none';                submitBtn.style.display = 'block';            } else {                nextBtn.style.display = 'block';                submitBtn.style.display = 'none';            }                        // In Review mode, special nav logic handles buttons.            if(isReviewMode) {                document.getElementById('rev-prev-btn').style.visibility = index === 0 ? 'hidden' : 'visible';                document.getElementById('rev-next-btn').style.display = index === totalQuestions - 1 ? 'none' : 'block';                document.getElementById('rev-exit-btn').style.display = index === totalQuestions - 1 ? 'block' : 'none';                showReviewNotification(questionData, userAnswers[index]);            }        }        function selectOption(qIndex, optIndex) {            userAnswers[qIndex] = optIndex;                        // Re-render only options to show selected state with tween            const optionItems = document.querySelectorAll('.option-item');            optionItems.forEach((item, i) => {                if (i === optIndex) item.classList.add('selected');                else item.classList.remove('selected');            });        }        function nextQuestion() {            if (currentQuestionIndex < totalQuestions - 1) {                currentQuestionIndex++;                updateProgressBar(); // Progress increases ONLY when going to next question                loadQuestion(currentQuestionIndex);            }        }        function prevQuestion() {            if (currentQuestionIndex > 0) {                currentQuestionIndex--;                loadQuestion(currentQuestionIndex);            }        }        // Progress bar increases progress when going to next question        function updateProgressBar() {            const fill = document.getElementById('progress-bar-fill');            // Calculated as number of questions traversed / total questions            const percent = (currentQuestionIndex / totalQuestions) * 100;            fill.style.width = percent + '%';        }        // --- SUBMIT & SCORE LOGIC ---        function submitQuiz() {            clearInterval(timerInterval);            document.getElementById('timer-display').style.display = 'none';            switchScreen('result-screen');            hideFullscreen(); // Exit full screen on submit        }        // Sau khi nộp bài hiển thị điểm số theo dài vòng tròn chỉ độ đầy và số phần trăm ở giữa        function calculateScore() {            let correctCount = 0;            currentQuizQuestions.forEach((q, i) => {                if (userAnswers[i] === q.a) correctCount++;            });            return correctCount;        }        function animateScoreCircle() {            const correctCount = calculateScore();            const percent = (correctCount / totalQuestions) * 100;            const percentRounded = Math.round(percent);                        // Update Text            document.getElementById('score-percent').textContent = percentRounded + '%';            document.getElementById('score-numeric').textContent = `${correctCount}/${totalQuestions}`;                        // Update Circle Stroke            const circle = document.getElementById('progress-circle-fill');            const circumference = 440; // 2 * PI * 70            const offset = circumference - (percent / 100 * circumference);                        // Small delay for CSS visibility tween            setTimeout(() => {                circle.style.strokeDashoffset = offset;            }, 100);        }        function retakeQuiz() {            switchScreen('setup-screen');        }        // --- TIMER LOGIC ---        function startTimer() {            updateTimerDisplay();            timerInterval = setInterval(() => {                timerSeconds--;                if (timerSeconds <= 0) {                    clearInterval(timerInterval);                    timerSeconds = 0;                    autoSubmit();                }                updateTimerDisplay();            }, 1000);        }        function updateTimerDisplay() {            const minutes = Math.floor(timerSeconds / 60);            const seconds = timerSeconds % 60;            const display = document.getElementById('timer-display');            display.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;                        // Alert color at < 1 minute (Intelligent UX)            if (timerSeconds < 60) {                display.style.color = '#e74c3c';            } else {                display.style.color = 'var(--text-color)';            }        }        function autoSubmit() {            alert('Hết giờ! Bài làm của bạn sẽ được tự động nộp.');            submitQuiz();        }        // --- REVIEW SYSTEM ---        function startReviewSystem() {            isReviewMode = true;            document.body.classList.add('review-mode');            switchScreen('quiz-screen');                        // Giao diện UI chỉ xem, thay đổi nav buttons            document.getElementById('standard-nav').style.display = 'none';            document.getElementById('review-nav').style.display = 'flex';                        loadQuestion(0);        }        function showResults() {            switchScreen('result-screen');        }        function retakeFromReview() {             retakeQuiz();        }        function reviewNext() { if (currentQuestionIndex < totalQuestions - 1) { currentQuestionIndex++; loadQuestion(currentQuestionIndex); } }        function reviewPrev() { if (currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(currentQuestionIndex); } }        // Review logic helper for options styling        function renderOptionForReview(optItem, qData, oIndex) {            const userAnswer = userAnswers[currentQuestionIndex];            const correctAnswer = qData.a;            if (oIndex === correctAnswer) {                // Đáp án hệ thống (correct)                optItem.classList.add('review-correct');            } else if (oIndex === userAnswer && userAnswer !== correctAnswer) {                // Đáp án người dùng sai (incorrect)                optItem.classList.add('review-user-incorrect');            } else if (oIndex === userAnswer) {                // Đáp án người dùng chọn (if correct, the previous condition is false, handled by review-correct style)                optItem.classList.add('review-user-choice');            }        }        function addReviewLabels(optItem, qData, oIndex) {             const userAnswer = userAnswers[currentQuestionIndex];             const correctAnswer = qData.a;                          if (oIndex === correctAnswer && oIndex === userAnswer) {                 optItem.innerHTML += `<span class="review-label correct">Đúng ✓</span>`;             } else if (oIndex === correctAnswer) {                  optItem.innerHTML += `<span class="review-label correct">Đáp án đúng ✓</span>`;             } else if (oIndex === userAnswer) {                  optItem.innerHTML += `<span class="review-label incorrect">Sai ✕</span>`;             }        }        // --- Review Notification Pop-up ---        // Giao diện UI giống như khi đang làm bài kèm theo hộp thoại thông báo nhỏ ở dưới        function showReviewNotification(qData, userAnswer) {            clearTimeout(notifyTimeout);                        const notify = document.getElementById('review-notification');            const icon = document.getElementById('notify-status-icon');            const msg = document.getElementById('notify-msg');                        notify.className = ''; // Reset classes            icon.className = 'notify-icon';                        if (userAnswer === qData.a) {                notify.classList.add('active', 'notify-correct');                icon.classList.add('correct');                msg.textContent = 'Chính xác! Bạn đã chọn đáp án đúng.';            } else if (userAnswer === null) {                notify.classList.add('active', 'notify-incorrect');                icon.classList.add('incorrect');                msg.textContent = 'Bỏ qua! Bạn chưa chọn đáp án.';            } else {                notify.classList.add('active', 'notify-incorrect');                icon.classList.add('incorrect');                const optionChars = ['A', 'B', 'C', 'D'];                msg.textContent = `Sai rồi! Đáp án đúng là ${optionChars[qData.a]}.`;            }            // Tự tắt sau 10 giây            notifyTimeout = setTimeout(() => {                hideReviewNotification();            }, 10000);        }        function hideReviewNotification() {            document.getElementById('review-notification').classList.remove('active');        }        // --- API & Fullscreen Helpers (Intelligent Coding) ---        function requestFullScreen(element) {            if (element.requestFullscreen) { element.requestFullscreen(); }            else if (element.mozRequestFullScreen) { element.mozRequestFullScreen(); }            else if (element.webkitRequestFullscreen) { element.webkitRequestFullscreen(); }            else if (element.msRequestFullscreen) { element.msRequestFullscreen(); }        }        function hideFullscreen() {            if (document.exitFullscreen) { document.exitFullscreen().catch(err => {}); }            else if (document.mozCancelFullScreen) { document.mozCancelFullScreen(); }            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }        }    </script></body></html>
